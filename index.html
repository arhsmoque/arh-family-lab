<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>arh-family-lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/theme.css">
<style>
  main{max-width:800px;margin:0 auto;padding:60px 20px}
  h1{color:var(--brand);font-size:36px}
  .app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-top:24px}
  .app-card{display:block;border-radius:var(--radius);border:1px solid var(--line);background:var(--surface);padding:20px;text-decoration:none;color:inherit;transition:box-shadow .15s ease,transform .15s ease}
  .app-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
  .app-card h3{margin:0 0 6px;font-family:var(--fd);color:var(--brand)}
  .app-card p{margin:0;font-size:14px;color:var(--muted)}
</style>
</head>
<body>
<main>
  <h1 class="fd">arh-family-lab</h1>
  <p class="muted">Small ad-hoc apps for family &amp; friends. Pick one below.</p>
  <div class="app-grid">
    <a class="app-card" href="apps/presentation/">
      <h3>Deckmate</h3>
      <p>Build and present school slide decks from your phone.</p>
    </a>
  </div>
</main>
</body>
</html>
